server:
  persistentVolume:
    enabled: true
    size: 20Gi
  resources:
    requests:
      memory: 1Gi
      cpu: 500m
  service:
    type: ClusterIP

alertmanager:
  persistentVolume:
    enabled: true
    size: 2Gi

pushgateway:
  enabled: false

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true
