{% extends "base.html" %}
{% block content %}
<h2>Messages</h2>
<table>
  <thead><tr><th>ID</th><th>From</th><th>To</th><th>Direction</th><th>Preview</th></tr></thead>
  <tbody>
    {% for m in messages %}
    <tr>
      <td><a href="/dashboard/message/{{ m.id }}">{{ m.id }}</a></td>
      <td>{{ m.from }}</td>
      <td>{{ m.to }}</td>
      <td>{{ m.direction }}</td>
      <td>{{ m.text[:80] }}</td>
    </tr>
    {% else %}
    <tr><td colspan="5">No messages</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
