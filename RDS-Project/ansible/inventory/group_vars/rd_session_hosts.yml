########################################################
# RD Session Host Configuration
########################################################

rd_session_host_role: true

########################################################
# Windows Features
########################################################

rd_sessionhost_features:
  - RDS-RD-Server

########################################################
# Session Collection
########################################################

session_collection_name: RDS-Collection

########################################################
# User Profile Disk
########################################################

enable_upd: false

########################################################
# FSLogix
########################################################

enable_fslogix: false

########################################################
# Session Limits
########################################################

idle_session_limit_minutes: 30

disconnected_session_limit_minutes: 60

########################################################
# RemoteApp Configuration
########################################################

enable_remoteapp: false

########################################################
# Security Configuration
########################################################

allow_clipboard_redirection: true
allow_drive_redirection: false
allow_printer_redirection: true