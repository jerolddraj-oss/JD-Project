########################################################
# Ansible Inventory for Azure RDS Environment
########################################################

all:
  children:

    ####################################################
    # RD Gateway Servers
    ####################################################

    rd_gateway:
      hosts:
        rdgw01:
          ansible_host: 10.0.1.10

    ####################################################
    # RD Broker Servers
    ####################################################

    rd_broker:
      hosts:
        rdbroker01:
          ansible_host: 10.0.1.11

    ####################################################
    # RD Session Hosts
    ####################################################

    rd_session_hosts:
      hosts:
        rdsh01:
          ansible_host: 10.1.1.10

        rdsh02:
          ansible_host: 10.1.1.11

    ####################################################
    # Windows Servers Group
    ####################################################

    windows_servers:
      children:
        rd_gateway:
        rd_broker:
        rd_session_hosts:

  vars:

    ####################################################
    # WinRM Configuration
    ####################################################

    ansible_connection: winrm
    ansible_port: 5985

    ####################################################
    # Authentication
    ####################################################

    ansible_user: azureadmin
    ansible_password: "ChangeM3Immediately!"

    ####################################################
    # WinRM Transport
    ####################################################

    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore

    ####################################################
    # Shell Type
    ####################################################

    ansible_shell_type: powershell

    ####################################################
    # Python Interpreter
    ####################################################

    ansible_python_interpreter: auto_silent