- name: Configure Domain Controller
  hosts: domain_controller
  gather_facts: yes

  tasks:
    - name: Install AD DS
      win_feature:
        name: AD-Domain-Services
        state: present
        include_management_tools: yes

    - name: Promote Domain Controller
      win_domain:
        dns_domain_name: corp.local
        safe_mode_password: Password123!
