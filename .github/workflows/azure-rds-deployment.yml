########################################################
# Azure RDS Deployment Pipeline
########################################################

name: Azure-RDS-Deployment

########################################################
# Trigger Configuration
########################################################

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

########################################################
# Required Permissions for OIDC
########################################################

permissions:
  id-token: write
  contents: read

########################################################
# Environment Variables
########################################################

env:
  TF_VERSION: 1.8.5

########################################################
# Jobs
########################################################

jobs:

  ######################################################
  # Terraform Validation
  ######################################################

  terraform-validation:

    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:

      ##################################################
      # Checkout Repository
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login using OIDC
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Configure Terraform Plugin Cache
      ##################################################

      - name: Configure Terraform Plugin Cache
        run: |
          mkdir -p $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      ##################################################
      # Cache Terraform Providers
      ##################################################

      - name: Cache Terraform Providers
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      ##################################################
      # Terraform Format Check
      ##################################################

      - name: Terraform Format Check
        working-directory: RDS-Project/terraform
        run: terraform fmt -recursive

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform init

      ##################################################
      # Terraform Validate
      ##################################################

      - name: Terraform Validate
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform validate

  ######################################################
  # Terraform Plan
  ######################################################

  terraform-plan:

    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: terraform-validation

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login using OIDC
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Configure Terraform Plugin Cache
      ##################################################

      - name: Configure Terraform Plugin Cache
        run: |
          mkdir -p $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform init

      ##################################################
      # Terraform Plan
      ##################################################

      - name: Terraform Plan
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform plan -out=tfplan

      ##################################################
      # Upload Terraform Plan
      ##################################################

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: RDS-Project/terraform/environments/poc/tfplan

  ######################################################
  # Terraform Apply
  ######################################################

  terraform-apply:

    name: Terraform Apply
    runs-on: ubuntu-latest

    needs: terraform-plan

    if: github.ref == 'refs/heads/main'

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login using OIDC
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Configure Terraform Plugin Cache
      ##################################################

      - name: Configure Terraform Plugin Cache
        run: |
          mkdir -p $HOME/.terraform.d/plugin-cache
          echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> $GITHUB_ENV

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform init

      ##################################################
      # Terraform Apply
      ##################################################

      - name: Terraform Apply
        working-directory: RDS-Project/terraform/environments/poc
        run: terraform apply -auto-approve

  ######################################################
  # Ansible Deployment
  ######################################################

  ansible-deployment:

    name: Ansible Deployment
    runs-on: ubuntu-latest

    needs: terraform-apply

    steps:

      ##################################################
      # Checkout Repository
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Install Ansible
      ##################################################

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible
          pip install pywinrm requests requests-ntlm

      ##################################################
      # Execute Main Playbook
      ##################################################

      - name: Execute Ansible Playbook
        working-directory: RDS-Project/ansible
        run: |
          ansible-playbook playbooks/site.yml
