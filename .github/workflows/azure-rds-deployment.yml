name: Azure-RDS-Deployment

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.8.5"

jobs:

  terraform-validation:

    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:

      ##################################################
      # Checkout
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login (OIDC)
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Create Terraform Plugin Cache
      ##################################################

      - name: Create Terraform Plugin Cache
        run: |
          mkdir -p "$HOME/.terraform.d/plugin-cache"

      ##################################################
      # Terraform Format
      ##################################################

      - name: Terraform Format
        working-directory: RDS-Project/terraform
        run: terraform fmt -recursive

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: |
          mkdir -p $TF_PLUGIN_CACHE_DIR
          terraform init

      ##################################################
      # Terraform Validate
      ##################################################

      - name: Terraform Validate
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: terraform validate

  terraform-plan:

    name: Terraform Plan
    runs-on: ubuntu-latest

    needs: terraform-validation

    steps:

      ##################################################
      # Checkout
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: |
          mkdir -p $TF_PLUGIN_CACHE_DIR
          terraform init

      ##################################################
      # Terraform Plan
      ##################################################

      - name: Terraform Plan
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: terraform plan -out=tfplan

      ##################################################
      # Upload Plan
      ##################################################

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: RDS-Project/terraform/environments/poc/tfplan

  terraform-apply:

    name: Terraform Apply
    runs-on: ubuntu-latest

    needs: terraform-plan

    if: github.ref == 'refs/heads/main'

    steps:

      ##################################################
      # Checkout
      ##################################################

      - name: Checkout Repository
        uses: actions/checkout@v4

      ##################################################
      # Azure Login
      ##################################################

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: |
          mkdir -p $TF_PLUGIN_CACHE_DIR
          terraform init

      ##################################################
      # Terraform Apply
      ##################################################

      - name: Terraform Apply
        working-directory: RDS-Project/terraform/environments/poc
        env:
          TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
        run: terraform apply -auto-approve
